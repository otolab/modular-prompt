# Tools実験設定
# MLXドライバーでのtool calling動作確認

models:
  qwen3-4b:
    model: "mlx-community/Qwen3-4B-Thinking-2507-heretic-8bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    disabled: true
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    # disabled: true
  gemma3-12b:
    model: "mlx-community/gemma-3-12b-it-qat-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 20
    disabled: true
  lfm2.5-jp:
    model: LiquidAI/LFM2.5-1.2B-JP-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
    disabled: true
  lfm2.5-instruct:
    model: LiquidAI/LFM2.5-1.2B-Instruct-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
    disabled: true
  lfm2.5-thinking:
    model: LiquidAI/LFM2.5-1.2B-Thinking-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "thinking", "japanese"]
    priority: 20
    disabled: true

drivers:
  mlx: {}

# 共通定義
_shared:
  tools: &tools_def
    - name: get_weather
      description: "指定された場所の現在の天気を取得する"
      parameters:
        type: object
        properties:
          location:
            type: string
            description: "天気を取得する場所（都市名）"
        required:
          - location
  queryOptions:
    weather: &tool_weather
      temperature: 0.3
      maxTokens: 512
      tools: *tools_def
      toolChoice: auto
    math: &tool_math
      temperature: 0.3
      maxTokens: 1024
      tools: *tools_def
      toolChoice: auto

modules:
  - name: tools-test
    path: ./tools-test-module.mjs
    description: "ツール呼び出し実験用"

testCases:
  - name: "天気ツール呼び出し"
    description: "get_weatherツールを呼び出すことを期待"
    input:
      question: "東京の天気を教えてください。"
    queryOptions: *tool_weather

  - name: "ツール不要の質問"
    description: "ツールを呼び出さずにテキストで回答することを期待"
    input:
      question: "1 + 1 は何ですか？"
    queryOptions: *tool_math

evaluators:
  - name: llm-requirement-fulfillment

evaluation:
  enabled: true
  provider: mlx
  model: lfm2.5-thinking