# MLX連続クエリ検証
# 同一モデルへの連続クエリが正しく処理されるか確認

models:
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"

drivers:
  mlx: {}

modules:
  - name: simple-a
    path: ./simple-test-module.mjs
    description: "モジュールA（日本語回答）"
  - name: simple-b
    path: ./simple-test-module-b.mjs
    description: "モジュールB（英訳）"

testCases:
  - name: "質問1"
    input:
      question: "1+1は？"
    queryOptions:
      temperature: 0.3
      maxTokens: 128

  - name: "質問2"
    input:
      question: "日本の首都は？"
    queryOptions:
      temperature: 0.3
      maxTokens: 128

  - name: "質問3"
    input:
      question: "水の化学式は？"
    queryOptions:
      temperature: 0.3
      maxTokens: 128
