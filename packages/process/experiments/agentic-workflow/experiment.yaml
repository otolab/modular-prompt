# Agentic Workflow v2 実験設定
# タスクタイプ別の出力品質をモデル間で比較

models:
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    disabled: true
  qwen3.5-9b:
    model: mlx-community/Qwen3.5-9B-MLX-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  lfm2.5-jp:
    model: LiquidAI/LFM2.5-1.2B-JP-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-instruct:
    model: LiquidAI/LFM2.5-1.2B-Instruct-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-thinking:
    model: LiquidAI/LFM2.5-1.2B-Thinking-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "thinking", "japanese"]
    priority: 20

drivers:
  mlx: {}

# 共通定義
_shared:
  models: &models_def
    # - qwen3.5-9b
    - default: lfm2.5-instruct
      plan: lfm2.5-thinking
      # plan: qwen3.5-9b

  # 外部ツール定義
  tools: &tools_def
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # v2 ビルトインツール定義
  planningTools: &planning_tools
    - name: __task
      description: "Register a task in the workflow. Call this multiple times to build the task list."
      parameters:
        type: object
        properties:
          description:
            type: string
            description: "What this task should accomplish"
          taskType:
            type: string
            enum: [planning, think, extractContext, outputMessage, outputStructured]
            description: "Type of task. Default: think"
          driverRole:
            type: string
            enum: [default, thinking, instruct, chat, plan]
            description: "Driver role override."
          withInputs:
            type: boolean
            description: "Include inputs in data."
          withMessages:
            type: boolean
            description: "Include messages in data."
          withMaterials:
            type: boolean
            description: "Include materials in data."
          insertAt:
            type: number
            description: "Index to insert at."
        required: [description]

  executionTools: &execution_tools
    - name: __task
      description: "Register a task in the workflow."
      parameters:
        type: object
        properties:
          description:
            type: string
            description: "What this task should accomplish"
          taskType:
            type: string
            enum: [planning, think, extractContext, outputMessage, outputStructured]
            description: "Type of task. Default: think"
        required: [description]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  # execution用: ビルトイン + 外部ツール統合
  executionAllTools: &execution_all_tools
    - name: __task
      description: "Register a task in the workflow."
      parameters:
        type: object
        properties:
          description:
            type: string
            description: "What this task should accomplish"
        required: [description]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # queryOptions プリセット
  baseOptions: &base_options
    temperature: 0.3
    maxTokens: 2048

  planningOptions: &planning_options
    temperature: 0.3
    maxTokens: 2048
    tools: *planning_tools
    toolChoice: required

  executionOptions: &execution_options
    temperature: 0.3
    maxTokens: 2048
    tools: *execution_tools

modules:
  - name: planning
    path: ./planning-module.mjs
    description: "Planning タスクタイプのプロンプトテスト"

  - name: think
    path: ./execution-module.mjs
    description: "Think タスクタイプのプロンプトテスト"

  - name: agentic
    path: ./agentic-module.mjs
    description: "Agentic workflow エンドツーエンドテスト"

testCases:
  # ---- Planning タスクタイプテスト ----
  - name: "計画生成: ドキュメント分析"
    description: "__taskツールでタスク登録を期待"
    modules: [planning]
    models: *models_def
    input:
      objective: "技術仕様書を分析し、主要な要件と制約事項を抽出してレポートを作成する"
      inputs:
        documentType: "技術仕様書"
        pages: 50
      taskList:
        - id: 1
          description: "Planning"
          taskType: planning
        - id: 2
          description: "Output"
          taskType: outputMessage
      currentTaskIndex: 0
    queryOptions: *planning_options

  # ---- Think タスクタイプテスト ----
  - name: "タスク実行: ツール呼び出し"
    description: "search_documentsツールを呼び出すことを期待"
    modules: [think]
    models: *models_def
    input:
      objective: "APIドキュメントを検索して認証方式を調べ、結果を整理する"
      taskList:
        - id: 1
          description: "Planning"
          taskType: planning
        - id: 2
          description: "関連ドキュメントを検索して取得する"
          taskType: think
        - id: 3
          description: "Output"
          taskType: outputMessage
      currentTaskIndex: 1
      executionLog:
        - taskId: 1
          taskType: planning
          result: "Tasks registered."
    queryOptions:
      <<: *base_options
      tools: *execution_all_tools
      toolChoice: auto

  - name: "タスク実行: テキスト応答"
    description: "ツール不要の分析タスク"
    modules: [think]
    models: *models_def
    input:
      objective: "収集したデータの分析レポートを作成する"
      taskList:
        - id: 1
          description: "Planning"
          taskType: planning
        - id: 2
          description: "データを分析して主要な発見をまとめる"
          taskType: think
        - id: 3
          description: "Output"
          taskType: outputMessage
      currentTaskIndex: 1
      executionLog:
        - taskId: 1
          taskType: planning
          result: "Tasks registered."
      inputs:
        activeUsers: 12500
        averageSession: "8.3分"
        retention7d: "42%"
    queryOptions: *execution_options

  # ---- Agentic process (エンドツーエンド) テスト ----
  - name: "agenticProcess: 時刻確認"
    description: "__timeビルトインツールを使って現在時刻を聞き出す"
    modules: [agentic]
    models: *models_def
    input:
      objective: "現在の日時を確認して、日本語で報告してください"
    process: agenticProcess
    processOptions:
      maxTasks: 5

evaluators:
  - name: structured-output-presence
