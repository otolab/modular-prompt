# Agentic Workflow v2 実験設定
# タスクタイプ別の出力品質をモデル間で比較

models:
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    disabled: true
  gemma-3-27b:
    model: 'mlx-community/gemma-3-27b-it-qat-4bit'
    provider: 'mlx'
    flags: ['japanese', 'reasoning', 'local']
    inputTokens: 128000
    completionTokens: 8192
  qwen3.5-9b:
    model: mlx-community/Qwen3.5-9B-MLX-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  quen3.5-2b-optiq:
    model: mlx-community/Qwen3.5-2B-OptiQ-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  qwq-bakeneko-32b:
    model: mlx-community/qwq-bakeneko-32b-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  lfm2.5-jp:
    model: LiquidAI/LFM2.5-1.2B-JP-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-instruct:
    model: LiquidAI/LFM2.5-1.2B-Instruct-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-thinking:
    model: LiquidAI/LFM2.5-1.2B-Thinking-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "thinking", "japanese"]
    priority: 20

drivers:
  mlx: {}

# 共通定義
_shared:
  models: &models_def
    # - qwq-bakeneko-32b
    # - qwen3.5-27b
    # - gemma-3-27b
    # - default: lfm2.5-instruct
      # plan: quen3.5-2b-optiq
    # - lfm2.5-thinking
    # - default: lfm2.5-instruct
    #   plan: lfm2.5-instruct
    - qwen3.5-9b
    # - quen3.5-2b-optiq

  # 外部ツール定義
  tools: &tools_def
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # v2 ビルトインツール定義
  planningTools: &planning_tools
    - name: __insert_tasks
      description: "Insert tasks into the workflow. Each task is executed by a separate AI instance that only sees the Objective, its own instruction, and results from previous tasks. Write instructions that are specific and self-contained."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Array of Task objects."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor. This is the only guidance the executor receives, so be concrete and self-contained."
                taskType:
                  type: string
                  enum: [planning, think, extractContext, outputMessage, outputStructured]
                  description: "think: general reasoning and analysis, can call tools. extractContext: extract information from inputs/materials, can call tools. outputMessage: generate final text output, no tools. outputStructured: generate JSON output, no tools. Default: think"
                driverRole:
                  type: string
                  enum: [default, thinking, instruct, chat, plan]
                  description: "Driver role override."
                withInputs:
                  type: boolean
                  description: "Include inputs in data."
                withMessages:
                  type: boolean
                  description: "Include messages in data."
                withMaterials:
                  type: boolean
                  description: "Include materials in data."
              required: [instruction]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  executionTools: &execution_tools
    - name: __insert_tasks
      description: "Insert tasks into the workflow."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Tasks to insert."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor."
                taskType:
                  type: string
                  enum: [planning, think, extractContext, outputMessage, outputStructured]
                  description: "Type of task. Default: think"
              required: [instruction]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  # execution用: ビルトイン + 外部ツール統合
  executionAllTools: &execution_all_tools
    - name: __insert_tasks
      description: "Insert tasks into the workflow."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Tasks to insert."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor."
                taskType:
                  type: string
                  enum: [planning, think, extractContext, outputMessage, outputStructured]
                  description: "Type of task. Default: think"
              required: [instruction]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # queryOptions プリセット
  baseOptions: &base_options
    temperature: 0.3
    maxTokens: 2048

  planningOptions: &planning_options
    temperature: 0.3
    maxTokens: 2048
    # apiStrategy: force-completion
    tools: *planning_tools
    toolChoice: required

  executionOptions: &execution_options
    temperature: 0.3
    maxTokens: 2048
    tools: *execution_tools

modules:
  - name: planning
    path: ./planning-module.ts
    description: "Planning タスクタイプのプロンプトテスト"

  - name: think
    path: ./execution-module.mjs
    description: "Think タスクタイプのプロンプトテスト"

  - name: agentic
    path: ./agentic-module.mjs
    description: "Agentic workflow エンドツーエンドテスト"

  - name: agentic-time-check
    description: "時刻確認用インラインモジュール"
    module:
      objective:
        - ユーザメッセージを理解して適切な応答を返す。
      instructions:
        - 日本語で応答する
      messages:
        - type: message
          role: user
          content: 現在の日時を確認して。

testCases:
  # ---- Planning タスクタイプテスト ----
  - name: "計画生成: ドキュメント分析"
    description: "__insert_tasksツールでタスク登録を期待"
    modules: [planning]
    models: *models_def
    input:
      userModule:
        objective:
          - "- 技術仕様書を分析し、主要な要件と制約事項を抽出してレポートを作成する"
        instructions:
          - "- 仕様書の各セクションから要件を漏れなく抽出すること"
          - "- 機能要件と非機能要件を区別して整理すること"
          - "- 制約事項は技術的制約とビジネス制約に分類すること"
        guidelines:
          - "- 出力は日本語で作成すること"
          - "- 箇条書きで簡潔にまとめること"
      inputs:
        documentType: "技術仕様書"
        pages: 50
      taskList:
        - id: 1
          instruction: "ワークフローの作業プラン（Task）を作成・編集します"
          taskType: planning
        - id: 2
          instruction: "Output"
          taskType: outputMessage
      currentTaskIndex: 0
    queryOptions: *planning_options

