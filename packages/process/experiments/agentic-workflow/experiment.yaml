# Agentic Workflow 実験設定
# Planning/Executionフェーズの出力品質をモデル間で比較

models:
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    disabled: true
  qwen3.5-9b:
    model: mlx-community/Qwen3.5-9B-MLX-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  lfm2.5-jp:
    model: LiquidAI/LFM2.5-1.2B-JP-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-instruct:
    model: LiquidAI/LFM2.5-1.2B-Instruct-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-thinking:
    model: LiquidAI/LFM2.5-1.2B-Thinking-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "thinking", "japanese"]
    priority: 20

drivers:
  mlx: {}

# 共通定義
_shared:
  models: &models_def
    # - default: lfm2.5-jp
    #   instruct: lfm2.5-instruct
    #   thinking: lfm2.5-thinking
    #   plan: qwen3.5-9b # lfm2.5-thinking
    # - qwen3.5-9b
    - lfm2.5-jp
    # - lfm2.5-instruct
    # - lfm2.5-thinking

  # 外部ツール定義
  tools: &tools_def
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # ビルトインツール定義（agenticProcess内部と同じ）
  planningTools: &planning_tools
    - name: __task
      description: "Register an execution task in the plan. Call this multiple times to build the task list."
      parameters:
        type: object
        properties:
          id:
            type: string
            description: "Unique task ID (e.g., task-1, task-2)"
          description:
            type: string
            description: "What this task should accomplish"
          taskType:
            type: string
            enum: [think, context, character, summarize, custom]
            description: "Type of task"
          guidelines:
            type: array
            items: { type: string }
            description: "Actions or principles to follow (2-4 items)"
          constraints:
            type: array
            items: { type: string }
            description: "Limitations or prohibitions (1-3 items)"
        required: [id, description]

  executionBuiltinTools: &execution_builtin_tools
    - name: __updateState
      description: "Save state information to pass to the next task."
      parameters:
        type: object
        properties:
          content:
            type: string
            description: "State information to hand over to the next task"
        required: [content]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  # execution用: ビルトイン + 外部ツール統合
  executionAllTools: &execution_all_tools
    - name: __updateState
      description: "Save state information to pass to the next task."
      parameters:
        type: object
        properties:
          content:
            type: string
            description: "State information to hand over to the next task"
        required: [content]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # queryOptions プリセット
  baseOptions: &base_options
    temperature: 0.3
    maxTokens: 2048

  planningOptions: &planning_options
    temperature: 0.3
    maxTokens: 2048
    tools: *planning_tools
    toolChoice: required

  executionOptions: &execution_options
    temperature: 0.3
    maxTokens: 2048
    tools: *execution_builtin_tools

modules:
  - name: planning
    path: ./planning-module.mjs
    description: "Planning phase: agenticProcess内部と同じプロンプト"

  - name: execution
    path: ./execution-module.mjs
    description: "Execution phase: agenticProcess内部と同じプロンプト"

  - name: agentic
    path: ./agentic-module.mjs
    description: "Agentic workflow: エンドツーエンドテスト用"

