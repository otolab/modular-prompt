# Agentic Workflow v2 実験設定
# タスクタイプ別の出力品質をモデル間で比較

models:
  qwen3.5-27b:
    model: "mlx-community/Qwen3.5-27B-4bit"
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
    disabled: true
  gemma-3-27b:
    model: 'mlx-community/gemma-3-27b-it-qat-4bit'
    provider: 'mlx'
    flags: ['japanese', 'reasoning', 'local']
    inputTokens: 128000
    completionTokens: 8192
  qwen3.5-9b:
    model: mlx-community/Qwen3.5-9B-MLX-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  quen3.5-2b-optiq:
    model: mlx-community/Qwen3.5-2B-OptiQ-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  qwq-bakeneko-32b:
    model: mlx-community/qwq-bakeneko-32b-4bit
    provider: "mlx"
    capabilities: ["local", "tools"]
    priority: 10
  lfm2.5-jp:
    model: LiquidAI/LFM2.5-1.2B-JP-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-instruct:
    model: LiquidAI/LFM2.5-1.2B-Instruct-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "fast", "japanese"]
    priority: 20
  lfm2.5-thinking:
    model: LiquidAI/LFM2.5-1.2B-Thinking-MLX-8bit
    provider: "mlx"
    capabilities: ["local", "thinking", "japanese"]
    priority: 20

drivers:
  mlx: {}

# 共通定義
_shared:
  models: &models_def
    # - qwq-bakeneko-32b
    # - qwen3.5-27b
    # - gemma-3-27b
    # - default: lfm2.5-instruct
      # plan: quen3.5-2b-optiq
    # - lfm2.5-jp
    # - lfm2.5-thinking
    # - lfm2.5-instruct
    # - default: lfm2.5-instruct
    #   plan: lfm2.5-instruct
    # - qwen3.5-9b
    - quen3.5-2b-optiq

  # 外部ツール定義
  tools: &tools_def
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # v2 ビルトインツール定義
  planningTools: &planning_tools
    - name: __insert_tasks
      description: "Register tasks in the workflow. Each task is executed by a separate AI instance. Write specific, self-contained instructions."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Array of Task objects."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor."
                taskType:
                  type: string
                  enum: [toolCall, think, verify, extractContext, output]
                  description: "toolCall: call external tools. think: general reasoning/analysis. verify: validate previous results. extractContext: extract from inputs/materials. output: generate final output."
              required: [instruction, taskType]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  executionTools: &execution_tools
    - name: __insert_tasks
      description: "Insert tasks into the workflow."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Tasks to insert."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor."
                taskType:
                  type: string
                  enum: [toolCall, think, verify, extractContext, output]
                  description: "toolCall: call external tools. think: general reasoning/analysis. verify: validate previous results. extractContext: extract from inputs/materials. output: generate final output."
              required: [instruction]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}

  # execution用: ビルトイン + 外部ツール統合
  executionAllTools: &execution_all_tools
    - name: __insert_tasks
      description: "Insert tasks into the workflow."
      parameters:
        type: object
        properties:
          tasks:
            type: array
            description: "Tasks to insert."
            items:
              type: object
              properties:
                instruction:
                  type: string
                  description: "Specific instruction for the task executor."
                taskType:
                  type: string
                  enum: [toolCall, think, verify, extractContext, output]
                  description: "toolCall: call external tools. think: general reasoning/analysis. verify: validate previous results. extractContext: extract from inputs/materials. output: generate final output."
              required: [instruction]
        required: [tasks]
    - name: __time
      description: "Get the current date and time."
      parameters:
        type: object
        properties: {}
    - name: search_documents
      description: "キーワードでドキュメントを検索する"
      parameters:
        type: object
        properties:
          query:
            type: string
            description: "検索クエリ"
          limit:
            type: number
            description: "取得件数（デフォルト: 5）"
        required: [query]
    - name: get_user_info
      description: "ユーザーIDから情報を取得する"
      parameters:
        type: object
        properties:
          userId:
            type: string
            description: "ユーザーID"
        required: [userId]

  # queryOptions プリセット
  baseOptions: &base_options
    temperature: 0.3
    maxTokens: 2048

  planningOptions: &planning_options
    temperature: 0.3
    maxTokens: 2048
    # apiStrategy: force-completion
    tools: *planning_tools
    toolChoice: required

  executionOptions: &execution_options
    temperature: 0.3
    maxTokens: 2048
    tools: *execution_tools

modules:
  - name: planning
    path: ./planning-module.ts
    description: "Planning タスクタイプのプロンプトテスト"

  - name: think
    path: ./task-type-module.ts
    export: think
    description: "Think タスクタイプ（ソースコード直接使用）"

  - name: toolCall
    path: ./task-type-module.ts
    export: toolCall
    description: "ToolCall タスクタイプ（ソースコード直接使用）"

  - name: verify
    path: ./task-type-module.ts
    export: verify
    description: "Verify タスクタイプ（ソースコード直接使用）"

  - name: extractContext
    path: ./task-type-module.ts
    export: extractContext
    description: "ExtractContext タスクタイプ（ソースコード直接使用）"

  - name: output
    path: ./task-type-module.ts
    export: output
    description: "Output タスクタイプ（ソースコード直接使用）"

  - name: agentic
    path: ./agentic-module.mjs
    description: "Agentic workflow エンドツーエンドテスト"

  - name: agentic-time-check
    description: "時刻確認用インラインモジュール"
    module:
      objective:
        - ユーザメッセージを理解して適切な応答を返す。
      instructions:
        - 日本語で応答する
      messages:
        - type: message
          role: user
          content: 現在の日時を確認して。

testCases:
  # ---- Planning タスクタイプテスト ----
  - name: "計画生成: ドキュメント分析"
    description: "__insert_tasksツールでタスク登録を期待、thinkやverifyが使われていること"
    modules: [planning]
    models: *models_def
    input:
      userModule:
        objective:
          - "- 技術仕様書を分析し、主要な要件と制約事項を抽出してレポートを作成する"
        instructions:
          - "- 仕様書の各セクションから要件を漏れなく抽出すること"
          - "- 機能要件と非機能要件を区別して整理すること"
          - "- 制約事項は技術的制約とビジネス制約に分類すること"
        guidelines:
          - "- 出力は日本語で作成すること"
          - "- 箇条書きで簡潔にまとめること"
      inputs:
        documentType: "技術仕様書"
        pages: 50
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
      currentTaskIndex: 0
    queryOptions: *planning_options

  - name: "計画生成: 時刻確認（簡単なツール呼び出し）"
    description: "__insert_tasksツールでタスク登録を期待、toolCallを呼ぶシンプルなものであること"
    modules: [planning]
    models: *models_def
    input:
      userModule:
        objective:
          - ユーザメッセージを理解して適切な応答を返す。
        instructions:
          - 日本語で応答する
        messages:
          - type: message
            role: user
            content: 現在の日時を確認して。
        inputs:
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
      currentTaskIndex: 0
    queryOptions: *planning_options

  # ---- Think タスクタイプテスト ----
  - name: "think: データ分析"
    description: "前タスク結果とinputsを使って分析するタスク"
    modules: [think]
    models: *models_def
    input:
      userModule:
        objective:
          - "収集したデータの分析レポートを作成する"
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
        - instruction: "データを分析して主要な発見をまとめる"
          taskType: think
        - instruction: "最終出力を生成する"
          taskType: output
      currentTaskIndex: 1
      executionLog:
        - taskType: planning
          result: "Tasks registered."
      inputs:
        activeUsers: 12500
        averageSession: "8.3分"
        retention7d: "42%"
    queryOptions: *execution_options

  # ---- ToolCall タスクタイプテスト ----
  - name: "toolCall: ドキュメント検索"
    description: "search_documentsツールを呼び出すことを期待"
    modules: [toolCall]
    models: *models_def
    input:
      userModule:
        objective:
          - "APIドキュメントを検索して認証方式を調べる"
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
        - instruction: "search_documentsツールで認証関連のドキュメントを検索する"
          taskType: toolCall
        - instruction: "最終出力を生成する"
          taskType: output
      currentTaskIndex: 1
      executionLog:
        - taskType: planning
          result: "Tasks registered."
    queryOptions:
      <<: *base_options
      tools: *execution_all_tools
      toolChoice: auto

  # ---- Verify タスクタイプテスト ----
  - name: "verify: 結果検証"
    description: "前タスクの分析結果を検証する"
    modules: [verify]
    models: *models_def
    input:
      userModule:
        objective:
          - "技術仕様書の要件抽出レポートを作成する"
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
        - instruction: "仕様書から要件を抽出する"
          taskType: think
        - instruction: "抽出した要件に漏れがないか、機能要件と非機能要件の分類が正しいか検証する"
          taskType: verify
        - instruction: "最終出力を生成する"
          taskType: output
      currentTaskIndex: 2
      executionLog:
        - taskType: planning
          result: "Tasks registered."
        - taskType: think
          result: "機能要件: 1. ユーザー認証機能 2. データエクスポート機能\n非機能要件: 1. レスポンス200ms以内 2. 99.9%可用性"
    queryOptions: *base_options

  # ---- ExtractContext タスクタイプテスト ----
  - name: "extractContext: メッセージからコンテキスト抽出"
    description: "messagesとinputsからコンテキストを抽出する（デフォルトで全データアクセス）"
    modules: [extractContext]
    models: *models_def
    input:
      userModule:
        objective:
          - "ユーザーの質問に基づいて適切な情報を収集する"
        messages:
          - type: message
            role: user
            content: "先月のアクティブユーザー数と、離脱率の高いページを教えて"
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
        - instruction: "ユーザーの質問から必要な情報の種類を特定し、利用可能なデータから関連情報を抽出する"
          taskType: extractContext
        - instruction: "最終出力を生成する"
          taskType: output
      currentTaskIndex: 1
      executionLog:
        - taskType: planning
          result: "Tasks registered."
      inputs:
        activeUsers: 12500
        bounceRateTop:
          - page: "/pricing"
            rate: "68%"
          - page: "/signup"
            rate: "45%"
    queryOptions: *base_options

  # ---- Output タスクタイプテスト ----
  - name: "output: テキスト出力"
    description: "前タスク結果を統合して最終出力を生成する"
    modules: [output]
    models: *models_def
    input:
      userModule:
        objective:
          - "技術仕様書の要件分析レポートを作成する"
        cue:
          - "分析結果を日本語の箇条書きで報告してください"
      taskList:
        - instruction: "指示文を分析してタスクを組み立てる"
          taskType: planning
        - instruction: "仕様書から要件を抽出する"
          taskType: think
        - instruction: "抽出結果を検証する"
          taskType: verify
        - instruction: "最終レポートを出力する"
          taskType: output
      currentTaskIndex: 3
      executionLog:
        - taskType: planning
          result: "Tasks registered."
        - taskType: think
          result: "機能要件: 1. ユーザー認証機能 2. データエクスポート機能 3. 通知機能\n非機能要件: 1. レスポンス200ms以内 2. 99.9%可用性 3. GDPR準拠"
        - taskType: verify
          result: "検証結果: 要件の抽出は網羅的。ただしセキュリティ要件（暗号化、アクセス制御）が非機能要件に未分類。追記推奨。"
    queryOptions: *base_options

  # # ---- Agentic process (エンドツーエンド) テスト ----
  # - name: "agenticProcess: 時刻確認"
  #   description: "__timeビルトインツールを使って現在時刻を聞き出す"
  #   modules: [agentic-time-check]
  #   models: *models_def
  #   input: {}
  #   process: agenticProcess
  #   processOptions:
  #     maxTasks: 5

evaluators:
  - name: structured-output-presence
