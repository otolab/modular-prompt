[project]
name = "vllm_driver"
version = "0.1.0"
description = "vLLM driver for modular-prompt"
requires-python = ">=3.10,<3.14"
dependencies = [
    "vllm==0.18.0",
    "transformers==4.57.6",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["__main__"]

[tool.uv]
# vLLM は CUDA GPU 環境(Linux)でのみ動作
required-environments = ["sys_platform == 'linux'"]
