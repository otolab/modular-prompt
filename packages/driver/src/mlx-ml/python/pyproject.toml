[project]
name = "mlx_driver"
version = "0.1.0"
description = "MLX driver for moduler-prompt"
requires-python = ">=3.10,<3.14"
dependencies = [
    "flex==6.14.1",
    "hf-xet==1.2.0",
    "jinja2==3.1.6",
    "mlx>=0.31.2; sys_platform == 'darwin'",
    "mlx-lm==0.31.3; sys_platform == 'darwin'",
    "mlx-vlm==0.5.0",
    "tokenizers==0.22.2",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "transformers>=5.5.0",
]

[dependency-groups]
dev = ["pytest>=9.0"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools]
py-modules = ["__main__", "server"]

[tool.setuptools.packages.find]
where = ["."]
include = ["backends*", "handlers*", "utils*"]
